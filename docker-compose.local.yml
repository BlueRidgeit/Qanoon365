# Local development without Azurite — use this when Docker Azurite image is unavailable.
# Starts only Postgres and Redis. Document Vault upload/download will be unavailable
# but all other features (auth, dashboard, leads, matters, etc.) work normally.
#
# Usage: docker compose -f docker-compose.local.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: albasti-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: albasti
      POSTGRES_PASSWORD: albasti_dev
      POSTGRES_DB: albasti
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql

  redis:
    image: redis:7-alpine
    container_name: albasti-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
